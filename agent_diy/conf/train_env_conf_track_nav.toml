# =============================================================================
# Track Nav: joint obstacle-avoidance + navigation training (end-to-end).
# Track Nav: 避障 + 导航联合训练（端到端）
#
# Based on standard_nav.toml, adapted to track terrain (5 sub-terrains per lane,
# 10 parallel lanes with increasing difficulty).
# 参考 standard_nav.toml，适配 track 地形（5 段子地形串联成赛道，并行 10 条难度递增）
#
# Learning rate is set in NavConfig (lr = 1e-4).
# 学习率在 NavConfig 中设置（lr = 1e-4）
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
# Number of parallel environments, valid range: [1, 4096].
# 并行环境数量，合法范围：[1, 4096]
num_envs = 2048

# Max episode duration (seconds); shorter initially so the robot resets faster and
# learns from more diverse starting states. Increase to 150s once walking is stable.
# 最大 episode 时长（秒）；初期缩短让机器人更快重置，学到更多多样性。行走稳定后改回 150s
episode_length_s = 25

[env_conf]
# Random seed.
# Training: this seed is NOT transferred to terrain_generator.seed.
# Terrain tile layout uses numpy's global RNG state, so layouts are not
# locked to this field during training.
# Evaluation: this seed is transferred to terrain_generator.seed by the
# platform, making evaluation terrain layouts reproducible under the
# platform-assigned seed.
# 随机种子
# 训练：不透传到 terrain_generator.seed，地形瓦片布局由 numpy 全局 RNG
#      状态决定，训练阶段地形布局不被本字段锁定。
# 评估：由平台将 seed 透传到 terrain_generator.seed，保证在平台指定的
#      seed 下评估地形布局可复现。
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
# Terrain mode, valid values: "standard" | "track".
# 地形模式，合法值："standard" | "track"
mode = "track"

# In track mode, num_rows is overridden by [terrain.track].track_length (segments per lane).
# track 模式下 num_rows 会被 [terrain.track].track_length 覆盖（每条赛道段数）
num_rows = 10

# In track mode, num_cols is the number of difficulty tiers (parallel lanes, l0 easiest, l9 hardest).
# track 模式下 num_cols 代表难度档数（并行赛道数，l0 最简单，l9 最难）
num_cols = 10

# Difficulty range [min, max], valid range: [0.0, 1.0].
# Start near-zero: difficulty 0 maze ≈ flat ground with low walls → robot can learn to walk.
# 难度范围 [min, max]，合法范围：[0.0, 1.0]
# 起步接近零：difficulty 0 的迷宫 ≈ 平地 + 低矮墙壁，机器人可以先学走路
difficulty_range = [0.0, 0.02]

# Whether to enable terrain curriculum (promote/demote difficulty by performance).
# ENABLED: start from easiest tier, promote when walking stabilizes.
# 是否启用地形课程学习（按表现晋级/降级难度）
# 开启：从最简单档起步，行走稳定后自动晋级
curriculum = true

# Max init difficulty tier for robot placement, valid range: [0, 9];
# recommended 0 in track mode (start from the easiest tier).
# 机器人初始放置的最大难度档，合法范围：[0, 9]；track 模式建议 0（从最简单档开始）
max_init_terrain_level = 0

[terrain.track]
# Number of sub-terrains per lane along X-axis, valid range: [1, 5].
# 每条赛道串联的子地形数量（X 轴方向段数），合法范围：[1, 5]
track_length = 1

# Sub-terrain sequence: length must equal track_length, no duplicates allowed,
# and the LAST element must be "open_entry_maze" (track finish is always a maze);
# allowed: pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | open_entry_maze.
# 子地形序列，长度必须等于 track_length，元素不能重复，
# 且最后一个元素必须为 "open_entry_maze"（赛道终点恒为迷宫）；
# 合法值：pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | open_entry_maze
sub_terrains = ["open_entry_maze"]


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
# Master switch for domain randomization.
# Disabled initially for stability; enable once walking is stable to improve robustness.
# 域随机化总开关
# 初期关闭保证稳定性；行走稳定后开启增强鲁棒性
enable_domain_rand = false

# Whether to randomize ground friction.
# 是否随机化地面摩擦系数
randomize_friction = false

# Friction range [min, max], must be >= 0.
# 摩擦系数采样范围 [min, max]，必须 >= 0
friction_range = [0.8, 1.2]

# Whether to periodically push the robot.
# 是否周期性对机器人施加外部推力
push_robots = false

# Push interval (seconds), must be > 0.
# 推力间隔（秒），必须 > 0
push_interval_s = 15

# Max push velocity in XY plane (m/s), must be >= 0.
# XY 平面最大推力速度 (m/s)，必须 >= 0
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
# Whether to add noise to observations.
# Disabled initially for cleaner signal; enable later for sim-to-real transfer.
# 是否在观测中加入噪声
# 初期关闭保证信号干净；后续开启增强迁移能力
add_noise = false


# === Initial State ===
# === 初始状态 ===
[init_state]
# Robot initial position [x, y, z] (m); z valid range [0.30, 0.60]m, recommended 0.35m.
# 机器人初始位置 [x, y, z] (m)；z 合法范围：[0.30, 0.60]m，推荐 0.35m
pos = [0.0, 0.0, 0.35]


# === Velocity Commands: start slow, learn to walk first ===
# === 速度命令：起步慢，先学走路 ===
[commands]
# Velocity command resampling interval [min, max] (seconds).
# Longer interval so the robot has time to execute each command.
# 速度命令重采样区间 [min, max]（秒）
# 更长间隔让机器人有足够时间执行每条指令
resampling_time = [10.0, 10.0]

[commands.limit]
# Velocity command **hard limits** (curriculum may expand sampling range up to here).
# 速度命令 **采样上限**（硬约束，curriculum 最多扩展到该范围）

# X linear velocity range (m/s) — start narrow, curriculum will expand.
# X 方向线速度范围 (m/s) — 起步窄，curriculum 会扩展
lin_vel_x = [-1.0, 1.5]

# Y linear velocity range (m/s) — narrow to suppress strafing early on.
# Y 方向线速度范围 (m/s) — 初期收窄，抑制侧移
lin_vel_y = [-0.5, 0.5]

# Yaw angular velocity range (rad/s) — kept moderate.
# Z 轴角速度范围 (rad/s) — 适中
ang_vel_z = [-1.5, 1.5]

[commands.ranges]
# Velocity command **initial sampling ranges** (expand towards limit when curriculum is enabled).
# 速度命令 **初始采样范围**（curriculum 开启时会动态扩大到 limit）

# Slow forward speed only — the robot must learn to follow these first.
# 仅慢速前进——机器人必须先学会跟随这些指令
lin_vel_x = [0.05, 0.3]

# Minimal lateral.
# 最小侧向
lin_vel_y = [-0.05, 0.05]

# Small turning.
# 小幅转向
ang_vel_yaw = [-0.3, 0.3]


# =====================================================================
# Reward configuration: LOCOMOTION-FIRST strategy
# 奖励配置：运控优先策略
#
# Phase 1 (current): velocity tracking dominates, navigation is weak guide.
#   Robot must learn to stand and walk before it can navigate.
# Phase 2 (once walking stable): boost navigation weights, reduce locomotion.
#
# 阶段1（当前）：速度跟踪主导，导航仅弱引导。
#   机器人必须先学会站立和行走，然后才能导航。
# 阶段2（行走稳定后）：提高导航权重，降低运控权重。
#
# Each reward term must have a numeric `weight`; parameterized rewards use [rewards.<name>.params].
# 每个奖励项必须包含数值型 weight；带参数的奖励用 [rewards.<name>.params] 配置
# =====================================================================

# --- Positive: velocity tracking (PRIMARY — must dominate early training) ---
# --- 正向：速度跟踪（主导——训练初期必须占主导）---
[rewards.track_lin_vel_xy]
# HIGH: this is the core "learn to walk" signal. Must be the strongest positive reward.
# 高权重：这是核心的"学会走路"信号，必须是最强的正向奖励
weight = 1.5
[rewards.track_lin_vel_xy.params]
# Std of Gaussian kernel, controls how sharp the error → reward decay is.
# 高斯核标准差，控制误差 → 奖励的衰减陡峭程度
std = 0.25
# Velocity command name.
# 速度命令名
command_name = "base_velocity"

[rewards.track_ang_vel_z]
# HIGH: turning must also be well-rewarded.
# 高权重：转向也必须有足够奖励
weight = 0.75
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Positive: feet air time (gait learning) ---
# --- 正向：足部滞空时间（步态学习）---
[rewards.feet_air_time]
# Critical for learning a proper gait cycle (swing-stance alternation).
# 学习正确步态周期（摆动-支撑交替）的关键奖励
weight = 0.5
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.5

# --- Negative: base stability ---
# --- 负向：基座稳定 ---
[rewards.lin_vel_z]
# Penalty on vertical linear velocity — prevent bouncing.
# Z 方向线速度惩罚（抑制上下跳跃）
weight = -2.0

[rewards.ang_vel_xy]
# Penalty on pitch/roll angular velocity — prevent wobbling.
# X/Y 方向角速度惩罚（抑制 pitch/roll 抖动）
weight = -0.05

# --- Negative: joint smoothness ---
# --- 负向：关节 ---
[rewards.joint_acc]
# Joint acceleration penalty.
# 关节加速度惩罚
weight = -2.5e-7

[rewards.energy]
# Energy penalty (torque × joint velocity).
# 能耗惩罚（扭矩 × 角速度）
weight = -2e-5

[rewards.joint_torques]
# Joint torque penalty.
# 关节扭矩惩罚
weight = -1e-4

[rewards.dof_pos_limits]
# Penalty when joints approach position limits.
# 接近关节位置极限时的惩罚
weight = -2.0

# --- Negative: posture ---
# --- 负向：姿态 ---
[rewards.correct_base_height]
# Base height tracking — keep the robot at proper standing height.
# 基座高度跟踪——保持机器人正确的站立高度
weight = -1.0
[rewards.correct_base_height.params]
# Target base height (m).
# 目标基座高度 (m)
target_height = 0.38

# --- Negative: action smoothness ---
# --- 负向：动作平滑 ---
[rewards.action_rate]
# Delta between consecutive actions (1st order).
# 相邻动作差（一阶）
weight = -0.01

[rewards.action_smoothness]
# 2nd-order action smoothness.
# 动作二阶平滑
weight = -0.01

# --- Negative: undesired contacts ---
# --- 负向：碰撞 ---
# High weight: wall-collision cost must exceed the discounted reward of rushing into walls.
# 提高权重：撞墙代价必须高于冲墙的折扣收益差
[rewards.undesired_contacts]
weight = -5.0
[rewards.undesired_contacts.params]
# Max allowed contacts before penalty kicks in.
# 触发阈值：被罚前允许的最大接触数
threshold = 1

# --- Negative: foot height regulation (body frame) ---
# --- 负向：脚部调节（body frame）---
[rewards.feet_height_body]
weight = -0.05
[rewards.feet_height_body.params]
command_name = "base_velocity"
# Foot z-target in body frame (closer to 0 → higher swing).
# body frame 下脚 z 目标（越接近 0 抬腿越高）
target_height = -0.30
# tanh saturation slope.
# tanh 饱和斜率
tanh_mult = 2.0

# --- Negative: hip joint returning to default ---
# --- 负向：髋关节回默认 ---
[rewards.hip_to_default]
weight = -0.05

# --- Termination penalty (CRITICAL: falling must hurt a LOT) ---
# --- 终止惩罚（关键：摔倒必须非常痛）---
[rewards.termination]
# HIGH: the discounted return of falling must far exceed any short-term gain from wild actions.
# Without this, the policy has no reason to stay upright.
# 高权重：摔倒的折扣代价必须远超任何短期疯狂动作的收益
# 否则策略没有理由保持直立
weight = -5.0

# --- Anti-tipping (CRITICAL: must be strong enough to prevent bad_orientation) ---
# --- 防倾倒（关键：必须足够强以防止 bad_orientation）---
[rewards.flat_orientation]
# STRONG: this is the primary signal preventing the robot from tipping over.
# The training log shows bad_orientation kills 87.5% of episodes at step 26-65.
# 强权重：这是防止机器人倾倒的首要信号
# 训练日志显示 bad_orientation 在 step 26-65 杀死 87.5% 的 episode
weight = -5.0

# --- Anti-stumbling ---
# --- 防绊倒 ---
[rewards.feet_stumble]
# Penalty when foot hits edge: horizontal force >> vertical.
# 脚碰台阶边缘时水平力 >> 垂直力的惩罚
weight = -0.5

# --- Avoidance: penalize not turning when blocked ahead ---
# --- 避障：前方被障碍阻挡时未主动转向的惩罚 ---
[rewards.obstacle_evasion]
# Reduced: don't overwhelm the locomotion signal early on.
# 降低：初期不要压过运控信号
weight = -0.5
[rewards.obstacle_evasion.params]
command_name = "base_velocity"


# =====================================================================
# Navigation rewards (WEAK initially — the robot can't navigate if it can't walk)
# 导航奖励（初期弱化——机器人不会走路就无法导航）
#
# Once the robot walks stably (abnormal < 30%), boost these weights:
#   heuristic_navigation: 0.5 → 5.0
#   reach_goal: 5.0 → 50.0
#   approach_goal: 1.0 → 5.0
#   goal_heading: 0.1 → 0.5
# Once walking + basic nav is stable (abnormal < 10%), boost further:
#   heuristic_navigation: 5.0 → 10.0
#   reach_goal: 50.0 → 100.0
#   approach_goal: 5.0 → 10.0
# =====================================================================

# Main navigation: weak initially, ramp up once walking stabilizes.
# 主导航：初期弱化，行走稳定后逐步提升
[rewards.heuristic_navigation]
weight = 0.5
[rewards.heuristic_navigation.params]
# Obstacle threshold (height delta in meters, negative = wall/pit).
# 障碍判定阈值（高度差，米，负值 = 下凹/墙）
obstacle_threshold = -0.3

# Fallback when blocked: weak initially.
# 前方堵兜底：初期弱化
[rewards.deadend_escape]
weight = 0.5
[rewards.deadend_escape.params]
obstacle_threshold = -0.3
# Trapped threshold (0~1, larger = more lenient).
# 判定"被困"的阈值（0~1，越大越宽松）
trapped_threshold = 0.3

# Wall-proximity brake: keep but reduced.
# 近墙减速：保留但降低
[rewards.wall_proximity_brake]
weight = -1.0
[rewards.wall_proximity_brake.params]
obstacle_threshold = -0.3

# Velocity toward goal: weak guide.
# 朝向目标速度：弱引导
[rewards.velocity_toward_goal]
weight = 0.2

# Goal heading: weak guide.
# 目标朝向：弱引导
[rewards.goal_heading]
weight = 0.1

# Goal proximity: very weak.
# 目标接近：非常弱
[rewards.goal_proximity]
weight = 0.05
[rewards.goal_proximity.params]
scale_m = 15.0

# Approach goal: moderate — gives directional signal without overwhelming.
# 接近目标：适中——提供方向信号但不压过运控
[rewards.approach_goal]
weight = 1.0

# Reach-goal bonus (one-shot large reward when distance < threshold).
# 到达目标奖励（距离 < threshold 一次性大奖）
[rewards.reach_goal]
# Reduced: 100.0 is too dominant for a robot that can't even walk.
# Ramp up to 100.0 once the robot can reliably reach goals.
# 降低：100.0 对连走路都不会的机器人太强势了
# 机器人能稳定到达目标后提升到 100.0
weight = 5.0
[rewards.reach_goal.params]
# Reach threshold (m). Must equal `_goal_reached_termination` threshold
# in velocity_env_cfg.py; mismatch causes a dead zone (terminated but
# reward == 0).
# 到达判定阈值 (m)，必须与 velocity_env_cfg.py 中 `_goal_reached_termination`
# 的 threshold 一致，否则产生"死区"（终止但奖励为 0）。
threshold = 0.6

# Navigation time penalty (constant per-step, encourages fast arrival).
# 导航时间惩罚（每步固定扣分，鼓励快速到达）
[rewards.navigation_time]
# Reduced: don't penalize the robot for being slow when it's learning to walk.
# 降低：机器人学走路时不要因为慢而惩罚它
weight = -0.001

# Track score aligned reward (combined time, pose, and energy scores).
# 与Track模式评分系统对齐的组合奖励（时间、姿态、能量）
[rewards.track_score_aligned]
# Reduced: this is a shaping reward, not the primary learning signal.
# 降低：这是塑形奖励，不是主要学习信号
weight = 0.2