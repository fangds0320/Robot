# =============================================================================
# Track Locomotion: locomotion training on track terrain (5 sub-terrains + maze).
# Track Locomotion: 赛道地形运动训练（5段子地形串联 + 迷宫）
#
# Based on standard_locomotion.toml, adapted for track terrain.
# 基于 standard_locomotion.toml，适配赛道地形。
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
num_envs = 2048
episode_length_s = 150

[env_conf]
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
mode = "track"
num_rows = 10
num_cols = 10
difficulty_range = [0.0, 1.0]
curriculum = true
max_init_terrain_level = 0

[terrain.track]
track_length = 5
sub_terrains = ["pyramid_slope", "pyramid_slope_inv", "pyramid_stairs", "pyramid_stairs_inv", "open_entry_maze"]


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
enable_domain_rand = true
randomize_friction = true
friction_range = [0.3, 1.5]
push_robots = true
push_interval_s = 15
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
add_noise = true


# === Initial State ===
# === 初始状态 ===
[init_state]
pos = [0.0, 0.0, 0.35]


# === Velocity Commands: tuned for maze nav (slow & safe traversal) ===
# === 速度命令：迷宫导航专用，低速安全通行 ===
[commands]
resampling_time = [5.0, 5.0]

[commands.limit]
lin_vel_x = [0.0, 0.8]
lin_vel_y = [-0.3, 0.3]
ang_vel_z = [-1.5, 1.5]

[commands.ranges]
lin_vel_x = [0.0, 0.5]
lin_vel_y = [-0.15, 0.15]
ang_vel_yaw = [-1.0, 1.0]


# =====================================================================
# Reward Configuration
# 奖励配置
# =====================================================================

# --- Positive: velocity tracking (down-weighted for track mode) ---
# --- 正向：速度跟踪（赛道模式下降权）---
[rewards.track_lin_vel_xy]
weight = 0.5
[rewards.track_lin_vel_xy.params]
std = 0.25
command_name = "base_velocity"

[rewards.track_ang_vel_z]
weight = 0.3
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Negative: base stability ---
# --- 负向：基座稳定 ---
[rewards.lin_vel_z]
weight = -3.0

[rewards.ang_vel_xy]
weight = -0.05

# --- Negative: energy & joint smoothness ---
# --- 负向：能耗与关节 ---
[rewards.energy]
weight = -2e-5

[rewards.joint_acc]
weight = -2.5e-7

[rewards.joint_torques]
weight = -5e-5

[rewards.dof_pos_limits]
weight = -2.0

# --- Negative: action smoothness ---
# --- 负向：动作平滑 ---
[rewards.action_rate]
weight = -0.005

# --- Negative: undesired contacts (high weight for wall collisions) ---
# --- 负向：碰撞（提高权重应对撞墙）---
[rewards.undesired_contacts]
weight = -2.0
[rewards.undesired_contacts.params]
threshold = 1

# --- Negative: base height tracking ---
# --- 负向：基座高度跟踪 ---
[rewards.correct_base_height]
weight = -1.0
[rewards.correct_base_height.params]
target_height = 0.38

# --- Positive: feet air time (long steps) ---
# --- 正向：长步幅 ---
[rewards.feet_air_time]
weight = 1.0
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.5

# --- Negative: feet sliding ---
# --- 负向：脚部打滑 ---
[rewards.feet_slide]
weight = -0.1

# --- Negative: feet stumble ---
# --- 负向：脚撞障碍物 ---
[rewards.feet_stumble]
weight = -0.1

# --- Negative: termination (high weight for track mode) ---
# --- 负向：非超时终止（赛道模式提高权重）---
[rewards.termination]
weight = -5.0

# --- Negative: no-fly (all feet off ground) ---
# --- 负向：四脚腾空 ---
[rewards.no_fly]
weight = -1.0

# --- Extra: anti-tipping ---
# --- 额外：防倾倒 ---
[rewards.flat_orientation]
weight = -2.0

# --- Navigation: obstacle evasion ---
# --- 导航：障碍规避 ---
[rewards.obstacle_evasion]
weight = -1.0
[rewards.obstacle_evasion.params]
command_name = "base_velocity"
obstacle_threshold = -0.3
near_x_end = 10
body_y_start = 3
body_y_end = 13
turn_std = 0.5

# --- Navigation: approach goal ---
# --- 导航：接近目标 ---
[rewards.approach_goal]
weight = 2.0

# --- Navigation: time penalty (encourage fast completion) ---
# --- 导航：时间惩罚（鼓励快速完成）---
[rewards.navigation_time]
weight = -0.01

# --- Joint position penalty (encourage default posture) ---
# --- 关节位置惩罚（鼓励默认姿态）---
[rewards.joint_position_penalty]
weight = -0.3
[rewards.joint_position_penalty.params]
stand_still_scale = 5.0
velocity_threshold = 0.1

# --- Goal reach (large bonus) ---
# --- 到达目标（大奖）---
[rewards.reach_goal]
weight = 10.0
[rewards.reach_goal.params]
threshold = 0.6
